name: iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - uses: Swatinem/rust-cache@v2

      - name: Install tools
        run: brew install xcodegen xcbeautify

      - name: Build iOS (XCFramework + bindings)
        run: ./scripts/ios-build --crate-name $FFI_CRATE --release
        env:
          FFI_CRATE: myapp-ffi  # Change this

      - name: Generate Xcode project
        run: cd ios && xcodegen generate

      - name: Build for simulator
        run: |
          cd ios
          set -o pipefail
          xcodebuild build \
            -project *.xcodeproj \
            -scheme {{ProjectPascal}} \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipMacroValidation \
            ARCHS=arm64 \
            2>&1 | xcbeautify --is-ci

      - name: Run tests
        run: |
          cd ios
          set -o pipefail
          xcodebuild test \
            -project *.xcodeproj \
            -scheme {{ProjectPascal}} \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipMacroValidation \
            ARCHS=arm64 \
            2>&1 | xcbeautify --is-ci

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: xcframework
          path: ios/Frameworks/*.xcframework
          retention-days: 5
