name: "{{ProjectPascal}}"
options:
  bundleIdPrefix: dev.damsac
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  "{{ProjectPascal}}":
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
    dependencies:
      - framework: "Frameworks/{{ProjectPascal}}Core.xcframework"
        embed: false
      - package: MapLibreSwiftUI
        product: MapLibreSwiftUI
      - package: MapLibreSwiftUI
        product: MapLibreSwiftDSL
    settings:
      base:
        INFOPLIST_FILE: Info.plist
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: "{{ProjectPascal}}"
        UILaunchScreen: {}
  "{{ProjectPascal}}Tests":
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
      - path: Sources
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
    dependencies:
      - target: "{{ProjectPascal}}"
      - framework: "Frameworks/{{ProjectPascal}}Core.xcframework"
        embed: false
packages:
  MapLibreSwiftUI:
    url: https://github.com/maplibre/swiftui-dsl.git
    from: "0.24.0"
