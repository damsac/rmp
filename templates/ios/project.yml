name: "{{ProjectPascal}}"
options:
  bundleIdPrefix: dev.damsac
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  "{{ProjectPascal}}":
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
    dependencies:
      - framework: "Frameworks/{{project_underscore}}_ffi.xcframework"
        embed: false
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        ENABLE_TESTABILITY: YES
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: "{{ProjectPascal}}"
        UILaunchScreen: {}
  "{{ProjectPascal}}Tests":
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: "{{ProjectPascal}}"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/{{ProjectPascal}}.app/{{ProjectPascal}}"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: "{{ProjectPascal}}"
